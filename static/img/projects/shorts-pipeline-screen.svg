<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Shorts Pipeline public screen preview</title>
  <desc id="desc">A public-safe pipeline mockup showing upload, script generation, rendering, and output review for short-form video production.</desc>
  <rect width="1200" height="760" fill="#F7F1E4"/>
  <rect x="58" y="54" width="1084" height="652" rx="8" fill="#191715"/>
  <text x="96" y="108" fill="#FFF6E7" font-family="Pretendard, Arial, sans-serif" font-size="30" font-weight="850">Shorts Pipeline</text>
  <text x="96" y="144" fill="#C8BDA9" font-family="Pretendard, Arial, sans-serif" font-size="17" font-weight="700">project upload · LLM script · subtitle · FFmpeg render</text>

  <rect x="96" y="190" width="238" height="378" rx="8" fill="#FFFDF7"/>
  <text x="126" y="232" fill="#315CFF" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="850">01 INPUT</text>
  <text x="126" y="270" fill="#191715" font-family="Pretendard, Arial, sans-serif" font-size="22" font-weight="850">원본 업로드</text>
  <rect x="126" y="306" width="178" height="106" rx="8" fill="#F1E8D7" stroke="#D8CFBD"/>
  <path d="M180 370h70l-26-32-16 20-12-14-16 26Z" fill="#315CFF"/>
  <text x="126" y="458" fill="#655F54" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="700">uploads와 outputs를 분리하고 작업 상태를 프로젝트 단위로 추적합니다.</text>

  <rect x="364" y="190" width="238" height="378" rx="8" fill="#FFFDF7"/>
  <text x="394" y="232" fill="#FFB238" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="850">02 SCRIPT</text>
  <text x="394" y="270" fill="#191715" font-family="Pretendard, Arial, sans-serif" font-size="22" font-weight="850">대본 생성</text>
  <rect x="394" y="306" width="178" height="36" rx="8" fill="#FFF0C7"/>
  <rect x="394" y="358" width="128" height="14" rx="7" fill="#D8CFBD"/>
  <rect x="394" y="386" width="150" height="14" rx="7" fill="#D8CFBD"/>
  <rect x="394" y="414" width="96" height="14" rx="7" fill="#D8CFBD"/>
  <text x="394" y="458" fill="#655F54" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="700">LLM API로 대본 후보를 만들고 버전별 결과를 비교합니다.</text>

  <rect x="632" y="190" width="238" height="378" rx="8" fill="#FFFDF7"/>
  <text x="662" y="232" fill="#FF6A4A" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="850">03 RENDER</text>
  <text x="662" y="270" fill="#191715" font-family="Pretendard, Arial, sans-serif" font-size="22" font-weight="850">렌더링</text>
  <rect x="662" y="306" width="178" height="106" rx="8" fill="#191715"/>
  <rect x="680" y="328" width="142" height="12" rx="6" fill="#315CFF"/>
  <rect x="680" y="358" width="112" height="12" rx="6" fill="#FFB238"/>
  <rect x="680" y="388" width="132" height="12" rx="6" fill="#FF6A4A"/>
  <text x="662" y="458" fill="#655F54" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="700">FFmpeg와 자막 설정을 Docker 환경에 묶어 재현성을 높입니다.</text>

  <rect x="900" y="190" width="202" height="378" rx="8" fill="#FFFDF7"/>
  <text x="930" y="232" fill="#2F6F55" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="850">04 OUTPUT</text>
  <text x="930" y="270" fill="#191715" font-family="Pretendard, Arial, sans-serif" font-size="22" font-weight="850">결과 확인</text>
  <rect x="930" y="306" width="142" height="178" rx="8" fill="#191715"/>
  <rect x="948" y="332" width="106" height="92" rx="8" fill="#315CFF"/>
  <rect x="948" y="438" width="106" height="12" rx="6" fill="#FFB238"/>
  <text x="930" y="524" fill="#655F54" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="700">출력물, 실패 원인, 재시도 상태를 한 작업에서 확인합니다.</text>

  <path d="M334 378h30" stroke="#FFB238" stroke-width="5"/>
  <path d="M602 378h30" stroke="#FF6A4A" stroke-width="5"/>
  <path d="M870 378h30" stroke="#2F6F55" stroke-width="5"/>
  <rect x="96" y="610" width="1006" height="54" rx="8" fill="#25221D" stroke="#3A332B"/>
  <text x="126" y="644" fill="#C8BDA9" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="700">FastAPI endpoints separate upload, project state, script request, render job, and output review.</text>
</svg>
