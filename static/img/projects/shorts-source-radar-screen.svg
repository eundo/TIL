  <rect x="388" y="552" width="704" height="86" rx="8" fill="#191715"/>
  <text x="422" y="586" fill="#FFF6E7" font-family="Pretendard, Arial, sans-serif" font-size="19" font-weight="850">Export Queue</text>
  <text x="422" y="616" fill="#C8BDA9" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="700">선택한 후보만 Notion database, Slack TOP 후보 메시지, CSV 파일로 보냅니다.</text>
  <rect x="890" y="578" width="78" height="34" rx="8" fill="#315CFF"/>
