    <text x="568" y="458" fill="#655F54" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="700">Creative Commons 우선 · 중복 노출 숨김</text>
    <rect x="872" y="412" width="72" height="34" rx="8" fill="#E7EBFF"/>
    <text x="892" y="435" fill="#315CFF" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="850">84</text>
    <rect x="958" y="412" width="104" height="34" rx="8" fill="#DCEEE5"/>
    <text x="981" y="435" fill="#2F6F55" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="850">예정</text>
    <text x="568" y="488" fill="#847A6B" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="700">API cache hit · quota saved</text>
