  <text x="128" y="305" fill="#655F54" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="700">1min+ filter</text>
  <rect x="110" y="338" width="210" height="42" rx="8" fill="#FFFDF7" stroke="#D8CFBD"/>
  <text x="128" y="365" fill="#655F54" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="700">Quota saver</text>
  <rect x="110" y="414" width="210" height="52" rx="8" fill="#315CFF"/>
  <text x="142" y="447" fill="#FFFFFF" font-family="Pretendard, Arial, sans-serif" font-size="18" font-weight="850">후보 찾기</text>
  <rect x="110" y="482" width="98" height="38" rx="8" fill="#FFB238"/>
  <text x="136" y="506" fill="#191715" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="850">Sample</text>
  <rect x="222" y="482" width="98" height="38" rx="8" fill="#FFFDF7" stroke="#D8CFBD"/>
  <text x="250" y="506" fill="#34302A" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="850">Cache</text>

  <text x="388" y="176" fill="#191715" font-family="Pretendard, Arial, sans-serif" font-size="24" font-weight="850">Candidate Queue</text>
  <text x="388" y="206" fill="#847A6B" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="700">score, risk, status, export target</text>

  <g>
    <rect x="388" y="238" width="704" height="128" rx="8" fill="#FFFDF7" stroke="#D8CFBD"/>
    <rect x="416" y="266" width="126" height="72" rx="8" fill="#191715"/>
    <rect x="430" y="280" width="98" height="12" rx="6" fill="#315CFF"/>
    <rect x="430" y="304" width="72" height="12" rx="6" fill="#FFB238"/>
