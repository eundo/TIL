<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Shorts Source Radar public screen preview</title>
  <desc id="desc">A public-safe dashboard mockup showing candidate discovery, scoring, status review, and export actions.</desc>
  <rect width="1200" height="760" fill="#F7F1E4"/>
  <rect x="46" y="42" width="1108" height="676" rx="8" fill="#FFFDF7" stroke="#D8CFBD"/>
